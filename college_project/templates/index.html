{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>College Website</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
text-align:center;
}

header{
background:#004080;
color:white;
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding:20px;
}

.logo{
width:120px;
position:absolute;
left:20px;
}

table{
margin:60px auto;
border-collapse:collapse;
width:50%;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

th,td{
padding:12px;
border:1px solid #ccc;
font-size:18px;
}

th{
background:#004080;
color:white;
}

a{
text-decoration:none;
color:#004080;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<img src="{% static 'images/OIP.webp' %}" class="logo">

<div>
<h1>Trinity College of Engineering</h1>
<p>Select Course</p>
</div>

</header>

<table>

<tr>
<th>S.No</th>
<th>Course</th>
</tr>

{% for key,value in course_names.items %}

<tr>

<td>{{ forloop.counter }}</td>

<td>
<a href="{% url 'branches' key %}">
{{ value }}
</a>
</td>

</tr>

{% endfor %}

</table>

</body>

</html>
